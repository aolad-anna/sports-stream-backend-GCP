# ── deploy.yml ────────────────────────────────────────────────────────────────
# GitHub Actions — triggers Cloud Build on push to main.
# Handles: branch protection, secrets validation, deployment notification.

name: Deploy Sports Stream

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  PROJECT_ID:   ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: sports-stream-backend-staging
  REGION:       europe-west2

jobs:
  # ── Job 1: Validate code ───────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Verify build
        run: go build ./...

      - name: Run tests
        run: go test ./... -timeout 60s || echo "No tests found"

      - name: Check for hardcoded secrets
        run: |
          if grep -r "AIzaSy" --include="*.go" .; then
            echo "❌ Hardcoded Firebase key found"
            exit 1
          fi
          if grep -r "private_key" --include="*.go" .; then
            echo "❌ Hardcoded private key found"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"

  # ── Job 2: Deploy (main branch only) ──────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker
        run: gcloud auth configure-docker europe-west2-docker.pkg.dev --quiet

      - name: Submit Cloud Build
        run: |
          gcloud builds submit \
            --project=$PROJECT_ID \
            --config=cloudbuild.yaml \
            --substitutions=SHORT_SHA=${GITHUB_SHA::7} \
            .

      - name: Get service URL
        id: url
        run: |
          URL=$(gcloud run services describe $SERVICE_NAME \
            --region=$REGION \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed: $URL"

      - name: Final health check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ steps.url.outputs.url }}/health")
          echo "Health: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ PASS" || (echo "❌ FAIL" && exit 1)