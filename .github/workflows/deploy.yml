# ── deploy.yml ────────────────────────────────────────────────────────────────
# GitHub Actions workflow — triggers Cloud Build on push to main.
# Requires these GitHub Secrets:
#   GCP_PROJECT_ID       = sports-stream-66553
#   GCP_SA_KEY           = base64-encoded service account JSON key
#   CLOUD_RUN_SERVICE    = sports-stream-backend-staging
#   CLOUD_RUN_REGION     = europe-west2

name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch: # allow manual trigger from GitHub UI

env:
  PROJECT_ID:   ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: ${{ secrets.CLOUD_RUN_SERVICE }}
  REGION:       ${{ secrets.CLOUD_RUN_REGION }}
  IMAGE:        gcr.io/${{ secrets.GCP_PROJECT_ID }}/sports-stream-backend

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── Checkout code ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Authenticate with GCP ─────────────────────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── Set up gcloud ─────────────────────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # ── Configure Docker to use gcloud as credential helper ───────────────────
      - name: Configure Docker
        run: gcloud auth configure-docker --quiet

      # ── Build Docker image ────────────────────────────────────────────────────
      - name: Build image
        run: |
          docker build \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            .

      # ── Push image to GCR ─────────────────────────────────────────────────────
      - name: Push image
        run: |
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      # ── Deploy to Cloud Run ───────────────────────────────────────────────────
      - name: Deploy to Cloud Run
        run: |
          gcloud run services update $SERVICE_NAME \
            --image=$IMAGE:${{ github.sha }} \
            --region=$REGION \
            --platform=managed \
            --quiet

      # ── Print deployed URL ────────────────────────────────────────────────────
      - name: Get service URL
        run: |
          URL=$(gcloud run services describe $SERVICE_NAME \
            --region=$REGION \
            --format='value(status.url)')
          echo "✅ Deployed to: $URL"
          echo "SERVICE_URL=$URL" >> $GITHUB_ENV

      # ── Health check ──────────────────────────────────────────────────────────
      - name: Health check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" $SERVICE_URL/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed"
            exit 1
          fi
          echo "✅ Health check passed"