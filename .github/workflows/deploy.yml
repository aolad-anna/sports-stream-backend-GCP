# ══════════════════════════════════════════════════════════════════════════════
# Sports Stream — Complete CI/CD Pipeline
# ══════════════════════════════════════════════════════════════════════════════
# Flow:
#   1. Code Quality    — format check, vet, lint
#   2. Security Scan   — no hardcoded secrets, no vulnerable deps
#   3. Build & Test    — compile all services, run tests
#   4. Docker Build    — build and scan container image
#   5. Deploy          — push to Artifact Registry, deploy to Cloud Run
#   6. Health Check    — verify all services are up after deploy
#   7. Notify          — deployment summary
# ══════════════════════════════════════════════════════════════════════════════

name: Sports Stream CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (emergency deploy)'
        required: false
        default: 'false'

env:
  PROJECT_ID:   ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: sports-stream-backend-staging
  REGION:       europe-west2
  REGISTRY:     europe-west2-docker.pkg.dev
  REPOSITORY:   sports-stream
  GO_VERSION:   '1.22'

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — Code Quality
  # ════════════════════════════════════════════════════════════════════════════
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Check Go formatting
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "❌ These files need formatting:"
            echo "$UNFORMATTED"
            echo "Run: gofmt -w ."
            exit 1
          fi
          echo "✅ All Go files properly formatted"

      - name: Go vet (catches bugs)
        run: |
          go vet ./...
          echo "✅ go vet passed"

      - name: Check go.mod is tidy
        run: |
          go mod tidy
          if ! git diff --quiet go.mod go.sum; then
            echo "❌ go.mod or go.sum is not tidy"
            echo "Run: go mod tidy"
            exit 1
          fi
          echo "✅ go.mod is tidy"

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — Security Scan
  # ════════════════════════════════════════════════════════════════════════════
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Scan for hardcoded secrets in Go files
        run: |
          FOUND=0

          # Check for Firebase API keys
          if grep -rn "AIzaSy" --include="*.go" .; then
            echo "❌ Hardcoded Firebase API key found"
            FOUND=1
          fi

          # Check for private keys
          if grep -rn "BEGIN PRIVATE KEY\|BEGIN RSA PRIVATE KEY" --include="*.go" .; then
            echo "❌ Hardcoded private key found in Go code"
            FOUND=1
          fi

          # Check for GCP credentials
          if grep -rn "service_account" --include="*.go" . | grep -v "//"; then
            echo "❌ Possible hardcoded GCP credentials found"
            FOUND=1
          fi

          # Check .env is not committed
          if git ls-files | grep -q "^\.env$"; then
            echo "❌ .env file is tracked by git — remove it"
            FOUND=1
          fi

          # Check JSON key files are not committed
          if git ls-files | grep -q "firebase-adminsdk\|service-account\|sa-key"; then
            echo "❌ Service account key file is tracked by git"
            FOUND=1
          fi

          if [ "$FOUND" = "1" ]; then
            exit 1
          fi
          echo "✅ No hardcoded secrets found"

      - name: Check for vulnerable dependencies
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || echo "⚠️ Vulnerability check completed with warnings"

      - name: Scan Dockerfile for security issues
        run: |
          # Check Dockerfile doesn't run as root
          if ! grep -q "USER\|user" Dockerfile; then
            echo "⚠️ Dockerfile may be running as root — consider adding USER directive"
          fi

          # Check no secrets in Dockerfile
          if grep -i "password\|secret\|key\|token" Dockerfile | grep -v "ARG\|#"; then
            echo "⚠️ Possible secrets in Dockerfile"
          fi
          echo "✅ Dockerfile scan complete"

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3 — Build & Test
  # ════════════════════════════════════════════════════════════════════════════
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: [code-quality, security]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build all services
        run: |
          echo "Building all services..."
          go build -v ./services/user/...        && echo "✅ user-service"
          go build -v ./services/stream/...      && echo "✅ stream-service"
          go build -v ./services/analytics/...   && echo "✅ analytics-service"
          go build -v ./services/notification/... && echo "✅ notification-service"
          go build -v ./services/admin/...       && echo "✅ admin-service"
          go build -v ./gateway/...              && echo "✅ gateway"
          echo "✅ All services built successfully"

      - name: Run tests
        if: ${{ github.event.inputs.skip_tests != 'true' }}
        run: |
          go test ./... -v -timeout 120s -race 2>&1 | tee test-results.txt
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ All tests passed"
          else
            echo "⚠️ Some tests failed or no tests found"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.txt
          retention-days: 7

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 4 — Docker Build & Scan
  # ════════════════════════════════════════════════════════════════════════════
  docker:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    needs: [build-test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    outputs:
      image: ${{ steps.meta.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set image metadata
        id: meta
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "tag=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Image: $IMAGE:$SHORT_SHA"

      - name: Build Docker image
        id: build
        run: |
          IMAGE=${{ steps.meta.outputs.image }}
          TAG=${{ steps.meta.outputs.tag }}
          docker build \
            --label "commit=$GITHUB_SHA" \
            --label "build=$GITHUB_RUN_ID" \
            --label "branch=$GITHUB_REF_NAME" \
            -t "$IMAGE:$TAG" \
            -t "$IMAGE:latest" \
            .
          echo "✅ Docker image built: $IMAGE:$TAG"

      - name: Scan image for vulnerabilities
        run: |
          IMAGE=${{ steps.meta.outputs.image }}
          TAG=${{ steps.meta.outputs.tag }}
          # Install trivy scanner
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          # Scan for CRITICAL vulnerabilities only
          trivy image \
            --severity CRITICAL \
            --exit-code 0 \
            --format table \
            "$IMAGE:$TAG" || echo "⚠️ Scan complete — review findings"
          echo "✅ Image scan complete"

      - name: Push image to Artifact Registry
        run: |
          IMAGE=${{ steps.meta.outputs.image }}
          TAG=${{ steps.meta.outputs.tag }}
          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:latest"
          echo "✅ Image pushed: $IMAGE:$TAG"

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 5 — Deploy to Cloud Run
  # ════════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    outputs:
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:$SHORT_SHA"

          echo "Deploying: $IMAGE"

          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image="$IMAGE" \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --cpu=2 \
            --memory=2Gi \
            --min-instances=1 \
            --max-instances=20 \
            --concurrency=500 \
            --timeout=300 \
            --set-env-vars="GCP_PROJECT_ID=${{ env.PROJECT_ID }},ENV=production,GCS_BUCKET=sports-stream-66553.appspot.com,CDN_BASE_URL=https://storage.googleapis.com/sports-stream-66553.appspot.com,TRANSCODER_LOCATION=europe-west1,VIEWER_SUB=viewer-events-analytics-sub,STREAM_SUB=stream-events-analytics-sub,NOTIFICATION_SUB=notification-events-sub,USER_SERVICE_URL=http://127.0.0.1:8081,STREAM_SERVICE_URL=http://127.0.0.1:8082,ANALYTICS_SERVICE_URL=http://127.0.0.1:8085,NOTIFICATION_SERVICE_URL=http://127.0.0.1:8083,ADMIN_SERVICE_URL=http://127.0.0.1:8084" \
            --set-secrets="FIREBASE_CREDENTIALS=FIREBASE_CREDENTIALS:latest,ADMIN_PANEL_PASSWORD=ADMIN_PANEL_PASSWORD:latest,ADMIN_PANEL_SESSION_SECRET=ADMIN_PANEL_SESSION_SECRET:latest" \
            --quiet

          # Get deployed URL
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $URL"

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 6 — Health Check
  # ════════════════════════════════════════════════════════════════════════════
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [deploy]

    steps:
      - name: Wait for service to stabilise
        run: sleep 20

      - name: Check gateway health
        run: |
          URL="${{ needs.deploy.outputs.url }}"
          echo "Checking: $URL/health"

          # Retry up to 5 times
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health")
            echo "Attempt $i — status: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Gateway health check passed"
              break
            fi
            if [ $i -eq 5 ]; then
              echo "❌ Health check failed after 5 attempts"
              exit 1
            fi
            sleep 10
          done

      - name: Check all services via health endpoint
        run: |
          URL="${{ needs.deploy.outputs.url }}"
          RESPONSE=$(curl -s "$URL/health")
          echo "Health response: $RESPONSE"

          # Check each service
          for SERVICE in user stream notification admin analytics; do
            STATUS=$(echo $RESPONSE | python3 -c "
          import json,sys
          data = json.load(sys.stdin)
          services = data.get('services', {})
          svc = services.get('$SERVICE', {})
          print(svc.get('status', 'unknown'))
          " 2>/dev/null || echo "unknown")
            if [ "$STATUS" = "up" ]; then
              echo "✅ $SERVICE-service: up"
            else
              echo "❌ $SERVICE-service: $STATUS"
            fi
          done

      - name: Check streams API
        run: |
          URL="${{ needs.deploy.outputs.url }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/v1/streams")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Streams API: ok"
          else
            echo "⚠️ Streams API returned: $STATUS"
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 7 — Summary
  # ════════════════════════════════════════════════════════════════════════════
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [code-quality, security, build-test, docker, deploy, health-check]
    if: always()

    steps:
      - name: Print summary
        run: |
          echo "## 🚀 Sports Stream Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Test | ${{ needs.build-test.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.docker.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Health Check | ${{ needs.health-check.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${GITHUB_SHA::7}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`$GITHUB_REF_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ needs.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY