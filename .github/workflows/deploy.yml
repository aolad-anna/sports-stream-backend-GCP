name: Build and Verify

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Go test
        run: go test ./...

      - name: Build binaries
        run: |
          go build ./gateway
          go build ./services/user
          go build ./services/stream
          go build ./services/notification
          go build ./services/admin
          go build ./services/analytics

      - name: Build Docker image
        run: docker build -t sports-stream-backend:ci .
