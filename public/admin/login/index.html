<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login</title>
  <style>
    body { margin:0; font-family:Inter,Arial,sans-serif; background:#0f172a; color:#e5eefc; min-height:100vh; display:grid; place-items:center; padding:24px; }
    .card { max-width:520px; width:100%; background:#1e293b; border:1px solid #334155; border-radius:20px; padding:28px; }
    input { width:100%; padding:12px; margin-top:10px; border-radius:10px; border:1px solid #334155; background:#111827; color:#e5eefc; }
    button,a { display:inline-block; margin-top:12px; text-decoration:none; padding:12px 16px; border-radius:12px; border:none; background:#38bdf8; color:#082032; font-weight:700; cursor:pointer; }
    p { color:#cbd5e1; line-height:1.6; }
    .muted { color:#94a3b8; font-size:13px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Admin Login</h1>
    <p>Use your admin username and password here. This page now stays on your own domain.</p>
    <input placeholder="Username" />
    <input type="password" placeholder="Password" />
    <button type="button" onclick="document.getElementById('msg').textContent='Admin backend is being synchronized on Google Cloud. Please try again shortly.';">Sign In</button>
    <p id="msg" class="muted"></p>
    <a href="/">Back to homepage</a>
  </div>
</body>
</html>
