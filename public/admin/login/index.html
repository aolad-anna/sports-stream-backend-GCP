<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login</title>
  <style>
    body { margin:0; font-family: Inter, Arial, sans-serif; background:#0f172a; color:#e5eefc; min-height:100vh; display:grid; place-items:center; padding:24px; }
    .card { max-width:520px; width:100%; background:#1e293b; border:1px solid #334155; border-radius:20px; padding:28px; }
    button,a { display:inline-block; margin-top:12px; text-decoration:none; padding:12px 16px; border-radius:12px; border:none; background:#38bdf8; color:#082032; font-weight:700; cursor:pointer; }
    p { color:#cbd5e1; line-height:1.6; }
  </style>
  <script defer src="/__/firebase/8.10.1/firebase-app.js"></script>
  <script defer src="/__/firebase/8.10.1/firebase-auth.js"></script>
  <script defer src="/__/firebase/init.js"></script>
</head>
<body>
  <div class="card">
    <h1>Admin Login</h1>
    <p>Sign in with your Google account. If your role is admin, you will be taken to the admin dashboard.</p>
    <button id="signin">Continue with Google</button>
    <p id="msg"></p>
    <a href="/">Back to homepage</a>
  </div>
  <script>
    window.addEventListener('load', function(){
      setTimeout(function(){
        if(!window.firebase || !firebase.apps.length) return;
        const auth = firebase.auth();
        document.getElementById('signin').onclick = async function(){
          const provider = new firebase.auth.GoogleAuthProvider();
          try { await auth.signInWithPopup(provider); location.href='/admin'; } catch(e) { document.getElementById('msg').textContent=e.message; }
        };
      }, 500);
    });
  </script>
</body>
</html>
