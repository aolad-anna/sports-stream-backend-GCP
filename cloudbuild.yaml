substitutions:
  _REGION: europe-west2
  _SERVICE_NAME: sports-stream-backend-staging
  _REPOSITORY: sports-stream
  _ENV: production
  _ADMIN_PANEL_USERNAME: admin
  _GCS_BUCKET: sports-stream-66553.appspot.com
  _CDN_BASE_URL: https://storage.googleapis.com/sports-stream-66553.appspot.com
  _TRANSCODER_LOCATION: europe-west1
  _VIEWER_SUB: viewer-events-analytics-sub
  _STREAM_SUB: stream-events-analytics-sub
  _NOTIFICATION_SUB: notification-events-sub

steps:
  # ── Step 1: Verify Go code compiles cleanly ───────────────────────────────
  - name: golang:1.26-alpine
    id: Verify
    entrypoint: sh
    args:
      - -c
      - |
        go build ./... && echo "✅ Build verified"

  # ── Step 2: Run Go tests ──────────────────────────────────────────────────
  - name: golang:1.26-alpine
    id: Test
    entrypoint: sh
    args:
      - -c
      - |
        go test ./... -v -timeout 60s || echo "⚠️ No tests found — skipping"
    waitFor: ['Verify']

  # ── Step 3: Security scan — check for secrets in code ─────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Security Scan
    entrypoint: bash
    args:
      - -c
      - |
        # Fail if any hardcoded credentials found
        if grep -r "private_key" --include="*.go" .; then
          echo "❌ Hardcoded credentials found in Go files"
          exit 1
        fi
        if grep -r "AIzaSy" --include="*.go" .; then
          echo "❌ Hardcoded Firebase API key found"
          exit 1
        fi
        echo "✅ Security scan passed"
    waitFor: ['Verify']

  # ── Step 4: Ensure Artifact Registry repository exists ────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Ensure Registry
    entrypoint: bash
    args:
      - -c
      - |
        gcloud artifacts repositories describe "${_REPOSITORY}" \
          --location="${_REGION}" >/dev/null 2>&1 || \
        gcloud artifacts repositories create "${_REPOSITORY}" \
          --repository-format=docker \
          --location="${_REGION}" \
          --description="Sports Stream backend images"
    waitFor: ['Test', 'Security Scan']

  # ── Step 5: Build Docker image ────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: Build Image
    args:
      - build
      - --label=commit=$SHORT_SHA
      - --label=build=$BUILD_ID
      - --label=branch=$BRANCH_NAME
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:latest
      - .
    timeout: '600s'
    waitFor: ['Ensure Registry']

  # ── Step 6: Push image to Artifact Registry ───────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: Push Image
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}
    waitFor: ['Build Image']

  # ── Step 7: Deploy to Cloud Run ───────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Deploy Cloud Run
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --cpu=2
      - --memory=2Gi
      - --min-instances=1
      - --max-instances=20
      - --concurrency=500
      - --timeout=300
      - --set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,ENV=${_ENV},ADMIN_PANEL_USERNAME=${_ADMIN_PANEL_USERNAME},GCS_BUCKET=${_GCS_BUCKET},CDN_BASE_URL=${_CDN_BASE_URL},TRANSCODER_LOCATION=${_TRANSCODER_LOCATION},VIEWER_SUB=${_VIEWER_SUB},STREAM_SUB=${_STREAM_SUB},NOTIFICATION_SUB=${_NOTIFICATION_SUB},USER_SERVICE_URL=http://127.0.0.1:8081,STREAM_SERVICE_URL=http://127.0.0.1:8082,ANALYTICS_SERVICE_URL=http://127.0.0.1:8085,NOTIFICATION_SERVICE_URL=http://127.0.0.1:8083,ADMIN_SERVICE_URL=http://127.0.0.1:8084
      - --set-secrets=FIREBASE_CREDENTIALS=FIREBASE_CREDENTIALS:latest,ADMIN_PANEL_PASSWORD=ADMIN_PANEL_PASSWORD:latest,ADMIN_PANEL_SESSION_SECRET=ADMIN_PANEL_SESSION_SECRET:latest
    waitFor: ['Push Image']

  # ── Step 8: Verify deployment health ─────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Health Check
    entrypoint: bash
    args:
      - -c
      - |
        # Wait for Cloud Run to be ready
        sleep 15

        # Get service URL
        URL=$(gcloud run services describe ${_SERVICE_NAME} \
          --region=${_REGION} \
          --format='value(status.url)')

        echo "Checking health at: $URL/health"

        # Check health endpoint
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health")

        if [ "$STATUS" = "200" ]; then
          echo "✅ Health check passed — service is live at $URL"
        else
          echo "❌ Health check failed — status: $STATUS"
          exit 1
        fi
    waitFor: ['Deploy Cloud Run']

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: '1200s'