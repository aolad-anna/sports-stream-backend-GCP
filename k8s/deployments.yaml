              value: production
            - name: GCP_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: sports-stream-secrets
                  key: gcp_project_id
            - name: FIREBASE_CREDENTIALS
              valueFrom:
                secretKeyRef:
                  name: sports-stream-secrets
                  key: firebase_credentials
            - name: ADMIN_PANEL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sports-stream-secrets
                  key: admin_username
            - name: ADMIN_PANEL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sports-stream-secrets
                  key: admin_password
            - name: ADMIN_PANEL_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: sports-stream-secrets
                  key: admin_session_secret
