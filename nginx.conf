events {
    worker_connections 1024;
}

http {
    # ── user-service (/api/v1/auth, /api/v1/users, /health) ──────────
    upstream user_service {
        server 127.0.0.1:8081;
    }

    # ── stream-service (/stream/) ─────────────────────────────────────
    upstream stream_service {
        server 127.0.0.1:8082;
    }

    # ── analytics-service (/analytics/) ──────────────────────────────
    upstream analytics_service {
        server 127.0.0.1:8085;
    }

    server {
        listen 8080;

        # ── Health check (root) ───────────────────────────────────────
        location /health {
            proxy_pass http://user_service/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── user-service routes ───────────────────────────────────────
        # POST /api/v1/auth/verify
        # GET  /api/v1/users/me
        # PATCH /api/v1/users/me
        location /api/v1/auth/ {
            proxy_pass http://user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/users/ {
            proxy_pass http://user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── stream-service routes ─────────────────────────────────────
        # GET  /api/v1/streams
        # POST /api/v1/streams
        # POST /api/v1/streams/:id/join
        # POST /api/v1/streams/:id/leave
        # GET  /api/v1/streams/:id/manifest
        location /api/v1/streams {
            proxy_pass http://stream_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── analytics-service routes ──────────────────────────────────
        # GET /api/v1/analytics/stream/:id
        location /api/v1/analytics/ {
            proxy_pass http://analytics_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Default — user-service ────────────────────────────────────
        location / {
            proxy_pass http://user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}